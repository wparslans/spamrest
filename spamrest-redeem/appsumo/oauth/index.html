<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redeem your SpamRest license · AppSumo</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23635bff'/><text x='50' y='70' font-size='58' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>S</text></svg>" />
<link rel="stylesheet" href="../../styles.css" />
</head>
<body class="center-page">
  <main class="redeem-card">
    <div class="brand center">
      <div class="brand-mark">S</div>
      <div class="brand-text">
        <span class="title">SpamRest</span>
        <span class="subtitle">AppSumo License Activation</span>
      </div>
    </div>

    <div id="redeem-state">
      <div class="spinner"></div>
      <p class="muted center">Checking your activation link…</p>
    </div>

    <footer class="card-footer">
      <span class="status-pill active" id="endpoint-pill">GET&nbsp;200 · OAuth redirect endpoint live</span>
    </footer>
  </main>

  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    var code = params.get('code');
    var licenseKey = params.get('license_key') || params.get('license');
    var el = document.getElementById('redeem-state');

    function esc(s){ return String(s).replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

    function render(html){ el.innerHTML = html; }

    if (code) {
      // AppSumo OAuth: a single-use ?code= was returned after consent.
      // Token exchange + license lookup must happen server-side (it needs the
      // client_secret, which must never live in a public static site).
      render(
        '<div class="state-icon ok">✓</div>' +
        '<h1 class="state-title">You\'re almost there</h1>' +
        '<p class="muted center">We received your AppSumo authorization code. ' +
        'Finish activation by sending this code to SpamRest.</p>' +
        '<div class="field"><label>Authorization code</label>' +
        '<div class="copy-row"><input readonly value="' + esc(code) + '" id="code-val"/>' +
        '<button class="copy-btn" data-copy="#code-val">Copy</button></div></div>' +
        '<a class="btn primary block" id="finish-btn" href="#">Finish activation</a>' +
        '<p class="hint center">Token exchange runs on the SpamRest backend — the static page never sees your client secret.</p>'
      );
      // The real exchange endpoint (serverless function / WP REST). Override via ?return_to=
      var returnTo = params.get('return_to') || (window.SPAMREST_EXCHANGE_URL || '');
      var btn = document.getElementById('finish-btn');
      if (returnTo) {
        var u = new URL(returnTo);
        u.searchParams.set('code', code);
        btn.href = u.toString();
      } else {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          alert('Set the exchange URL (window.SPAMREST_EXCHANGE_URL or ?return_to=) to complete activation.');
        });
      }
    } else if (licenseKey) {
      render(
        '<div class="state-icon ok">✓</div>' +
        '<h1 class="state-title">License received</h1>' +
        '<p class="muted center">Your AppSumo license key:</p>' +
        '<div class="field"><div class="copy-row"><input readonly value="' + esc(licenseKey) + '" id="lk-val"/>' +
        '<button class="copy-btn" data-copy="#lk-val">Copy</button></div></div>' +
        '<p class="hint center">Enter this key in your SpamRest plugin under <b>Settings → License</b> to activate.</p>'
      );
    } else {
      // No code/key — this is also what AppSumo's GET validation hits. Return a friendly 200 page.
      render(
        '<div class="state-icon">🔗</div>' +
        '<h1 class="state-title">SpamRest activation endpoint</h1>' +
        '<p class="muted center">This is the OAuth redirect URL for SpamRest on AppSumo. ' +
        'Buyers reach it automatically after redeeming their code.</p>' +
        '<a class="btn block" href="../../">Back to setup &amp; verification</a>'
      );
    }

    document.addEventListener('click', function (e) {
      var b = e.target.closest('.copy-btn'); if (!b) return;
      var t = document.querySelector(b.getAttribute('data-copy')); if (!t) return;
      navigator.clipboard.writeText(t.value).then(function(){
        var o=b.textContent; b.textContent='Copied!'; b.classList.add('copied');
        setTimeout(function(){ b.textContent=o; b.classList.remove('copied'); },1500);
      });
    });
  })();
  </script>
</body>
</html>
